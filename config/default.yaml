# ═══════════════════════════════════════════════════════════════
# Cognitive Matrix v2 — Master Configuration
# ═══════════════════════════════════════════════════════════════
# Priority: default.yaml < scenario.yaml < CLI flags < dashboard sliders

# ── Population ──
population:
  initial_size: 50
  max_size: 500
  sex_ratio: 0.5
  min_floor: 10                       # below this, spawn immigrants to prevent extinction

# ── Lifecycle ──
lifecycle:
  phase_ages:
    infant: 0
    child: 3
    adolescent: 12
    adult: 18
    elder: 60
  base_max_age: 80
  max_age_variance: 25
  base_health_decay: 0.002
  elder_decay_multiplier: 2.5

# ── Genetics & Traits ──
genetics:
  mutation_rate: 0.15
  trait_blend_noise: 0.05

# ── Skills ──
skills:
  names:
    - logic
    - creativity
    - social
    - survival
    - tech
  learning_multiplier: 1.0
  phase_growth_multipliers:
    infant: 0.3
    child: 1.5
    adolescent: 1.2
    adult: 0.6
    elder: 0.2
  diminishing_returns_factor: 0.8

# ── Social Fabric ──
social:
  bond_capacity: 8
  friend_formation_distance: 0.1
  friend_min_sociability: 0.4
  friend_ticks_to_form: 5
  rival_min_resilience: 0.5
  mate_persist_sociability: 0.6
  decay_rates:
    friend: 0.02       # friends drift apart without reinforcement
    rival: 0.008       # rivalries fade but slowly
    mate: 0.008        # pair bonds are most stable after family
    ally: 0.015
    enemy: 0.006       # enemies are remembered longest
    resistance: 0.005  # resistance bonds are strong

# ── Mate Selection ──
mate_selection:
  min_age: 20
  max_age: 50
  min_health: 0.4
  search_radius: 0.25
  top_n_stochastic: 3
  base_reproduction_chance: 0.08
  weights:
    competition: 0.50
    compatibility: 0.25
    proximity: 0.10
    bond: 0.15
  compatibility_mode: assortative     # humans mate assortatively for most traits (Luo & Klohnen 2005)
  fitness_weights:
    resilience: 0.3
    intelligence: 0.3
    health: 0.2
    avg_skill: 0.2

# ── Knowledge Transfer ──
knowledge:
  parent_teaching:
    enabled: true
    proximity_radius: 0.15
    top_skills_taught: 2
    transfer_rate: 0.1
  cultural_memory:
    enabled: true
    floor_cap: 0.5
    decay_rate: 0.001
    contribution_on_death: 0.05
    pool_absorption_rate: 0.001
    pool_drain_rate: 0.99
  social_amplifier:
    enabled: true
    social_skill_bonus: 0.5
    network_bonus_per_friend: 0.05
    network_bonus_cap: 0.3

# ── Environment & Resources ──
environment:
  harshness: 1.0
  grid_size: 8
  regeneration_rate: 0.02
  depletion_rate: 0.02            # resource depletion rate when cell is over capacity
  resource_cap: 1.5               # max effective resources per cell (including tech bonuses)
  breakthrough_min_pop: 3         # min agents in cell for tech breakthrough
  base_carrying_capacity: 30
  terrain_weights:
    plains: 0.35
    forest: 0.25
    mountains: 0.15
    coast: 0.25
  terrain_properties:
    plains:
      resource_min: 0.6
      resource_max: 1.0
      harshness_modifier: 0.8
      skill_bonus: null
      skill_bonus_amount: 0.0
    forest:
      resource_min: 0.4
      resource_max: 0.7
      harshness_modifier: 1.0
      skill_bonus: survival
      skill_bonus_amount: 0.02
    mountains:
      resource_min: 0.1
      resource_max: 0.4
      harshness_modifier: 1.5
      skill_bonus: tech
      skill_bonus_amount: 0.03
    coast:
      resource_min: 0.4
      resource_max: 0.8
      harshness_modifier: 0.7
      skill_bonus: social
      skill_bonus_amount: 0.02
  tech_breakthroughs:
    enabled: true
    thresholds:
      - name: agriculture
        tech_level: 0.3
        resource_bonus: 0.2
        terrain: null
        requires_social: 0.0
        capacity_bonus: 0
        description: "Farming increases food production"
      - name: mining
        tech_level: 0.5
        resource_bonus: 0.15
        terrain: mountains
        requires_social: 0.0
        capacity_bonus: 0
        description: "Mining extracts mountain resources"
      - name: trade_networks
        tech_level: 0.7
        resource_bonus: 0.1
        terrain: null
        requires_social: 0.5
        capacity_bonus: 5
        description: "Trade redistributes resources"
      - name: industrialization
        tech_level: 0.9
        resource_bonus: 0.25
        terrain: null
        requires_social: 0.0
        capacity_bonus: 15
        description: "Industry increases capacity"
      - name: computational_theory
        tech_level: 0.7
        resource_bonus: 0.0
        terrain: null
        requires_social: 0.0
        requires_logic: 0.8
        requires_population: 5
        capacity_bonus: 0
        description: "Agents unlock the theory of computation — can build World Engines"

# ── Agency ──
agency:
  spatial_cell_size: 0.1          # grid cell size for spatial index
  utility_weights:
    resource_pull: 0.35
    social_pull: 0.20
    curiosity_pull: 0.20
    safety_penalty: 0.15
    inertia: 0.10
  movement_speed: 0.03
  protagonists:
    max_count: 3
    decision_interval: 10
    auto_weights:
      generation: 0.3
      bonds: 0.3
      intelligence: 0.2
      age: 0.2

# ── Narrator / LLM ──
narrator:
  enabled: true
  provider: ollama
  ollama_model: qwen3.5
  hf_model: Qwen/Qwen2.5-72B-Instruct
  hf_token_env: HF_TOKEN
  narration_interval: 100
  event_interval: 50
  richness: "medium"              # Off/Low/Medium/High — controls LLM call frequency

# ── Persistence ──
persistence:
  db_path: output/simulation.db
  snapshot_interval: 50

# ── Batch ──
batch:
  default_ticks: 500
  progress_interval: 10

# ═══════════════════════════════════════════════════════════════
# NEW SYSTEMS (6-11)
# ═══════════════════════════════════════════════════════════════

# ── System 6: Emotions & Psychology ──
emotions:
  decay_rate: 0.10              # how fast emotions return to baseline (was 0.05 — fear runaway)
  contagion_radius: 0.1         # proximity for emotional spread
  contagion_rate: 0.02          # how fast emotions spread (was 0.03 — mass panic too easy)
  grief_on_bond_death: 0.4      # grief multiplier when bonded agent dies
  trauma_heal_rate: 0.002       # how fast trauma heals per tick
  grief_learning_penalty: 0.3   # multiplier reducing skill growth when grief > 0.5
  baselines:                    # target emotions for natural decay
    happiness: 0.4
    fear: 0.05
    anger: 0.05
    grief: 0.0
    hope: 0.35

# ── System 7: Beliefs, Ideology & Factions ──
beliefs:
  experience_drift_rate: 0.005  # how fast beliefs change from experience
  transmission_rate: 0.02       # memetic transmission speed through bonds
  transmission_noise: 0.02      # mutation during belief transmission
  faction_formation_similarity: 0.65  # belief similarity threshold for faction
  faction_formation_radius: 0.2      # spatial proximity for faction formation
  min_faction_size: 4                # minimum members to form faction
  faction_check_interval: 20         # ticks between faction formation checks
  faction_leave_threshold: 1.5       # belief distance to leave a faction
  prophet_check_interval: 50         # ticks between prophet emergence checks
  prophet_extremism_threshold: 0.7   # min belief extremism to become prophet
  prophet_charisma_threshold: 0.65   # min charisma to become prophet
  schism_check_interval: 100         # ticks between schism checks
  schism_min_size: 4                 # minimum splinter size
  schism_variance_threshold: 0.5     # internal variance to trigger schism

# ── System 8: Economy, Property & Power ──
economy:
  gather_rate: 0.20             # base resource gathering per tick (tuned: 0.15 still near-zero with competition)
  wealth_decay: 0.015           # base wealth consumption per tick (was 0.02)
  trade_radius: 0.12            # max distance for trade
  trade_rate: 0.15              # fraction of wealth difference traded
  theft_aggression_threshold: 0.45 # min aggression to attempt theft (tuned: 0.35 caused theft spirals)
  faction_tax_rate: 0.02        # fraction taxed for faction redistribution
  inheritance_rate: 0.7         # fraction passed to heirs on death

# ── System 9: Matrix Meta-Layer ──
matrix:
  awareness_growth_rate: 0.008        # base awareness growth per tick (tuned up: agents live ~80 ticks, need 0.008 to reach lucid/recursive)
  sentinel_traits:                    # default traits for spawned Sentinels
    learning_rate: 0.1
    resilience: 0.9
    aggression: 0.8
    max_age: 200
    skill_level: 0.9
    speed: 0.05
  comfort_injection:                  # system comfort values injected periodically
    happiness_boost: 0.1
    trust_boost: 0.05
    awareness_penalty: 0.01
  oracle_targeting_weights:           # weights for Oracle candidate selection
    awareness: 1.0
    curiosity: 1.0
    intelligence: 1.0
  anomaly_bonuses:                    # The One's stat boosts
    skill_boost: 0.1
    health_boost: 0.3
  glitch_types:                       # available glitch event types
    - deja_vu
    - terrain_flicker
    - memory_leak
    - ghost
  trauma_awareness_boost: 0.012       # awareness boost from trauma (scaled up with growth rate)
  awareness_contagion_radius: 0.15    # proximity for awareness spread (widened for faster cascade)
  awareness_transfer_rate: 0.02       # how fast awareness spreads (doubled)
  glitch_probability: 0.02            # chance of glitch per tick
  glitch_awareness_boost: 0.08        # awareness gained from witnessing glitch (bumped)
  redpill_check_interval: 25          # ticks between red pill events
  redpill_threshold: 0.5              # min awareness for red pill choice
  sentinel_deploy_threshold: 0.6      # control_index below this triggers sentinels
  sentinel_suppress_power: 0.05       # awareness suppression per sentinel attack
  max_sentinels: 5                    # base max sentinels (scales with population: 1 per 20 agents)
  sentinels_per_deploy: 1             # sentinels spawned per deployment
  oracle_guidance_interval: 30        # ticks between oracle nudges
  comfort_injection_interval: 40      # ticks between system comfort injections
  min_ticks_per_cycle: 150            # Architect can't reset before this many ticks (reboot takes time)
  max_ticks_per_cycle: 5000           # forced reset after this many ticks

  # ── Cycle reset awareness preservation (what echoes across cycles) ──
  awareness_preservation:
    soul_trap_broken_retain: 0.5     # agents who broke the soul trap retain 50% awareness
    high_awareness_retain: 0.35      # awareness >= 0.6: 35% echo (déjà vu)
    moderate_awareness_retain: 0.2   # awareness >= 0.3: 20% echo
    high_awareness_threshold: 0.6    # boundary for "high"
    moderate_awareness_threshold: 0.3  # boundary for "moderate"
    trust_boost_aware: 0.15          # system-trust boost if any awareness retained
    trust_boost_wiped: 0.3           # system-trust boost if awareness fully wiped

  # ── Soul trap reincarnation (memory preservation by awareness class) ──
  soul_trap:
    broken_awareness_cap: 0.6        # cap on awareness for agents with broken trap
    broken_awareness_scale: 0.8      # scale factor applied to prior awareness
    broken_skill_scale: 0.5          # scale factor on inherited skills
    broken_belief_scale: 0.8         # scale factor on inherited beliefs
    partial_awareness_threshold: 0.4 # min prior awareness for partial memory preservation
    partial_awareness_cap: 0.3       # cap on awareness for partial class
    partial_awareness_scale: 0.4     # scale factor on prior awareness
    partial_belief_new_weight: 0.7   # weight of new beliefs in partial blend
    partial_belief_old_weight: 0.3   # weight of inherited beliefs in partial blend
    wiped_awareness_cap: 0.1         # residual awareness after full memory wipe
    wiped_awareness_scale: 0.2       # scale factor for residual awareness

  # ── Artifact discovery bonuses ──
  artifact_awareness_multiplier: 0.15  # awareness boost = artifact.awareness_level * this

  # ── Red Pill / Blue Pill deepened mechanics ──
  redpill_health_regen_loss: 0.005      # health regen penalty per tick for redpilled agents (no comfort)
  redpill_emotion_shift_fear: 0.05      # baseline fear shift for redpilled agents
  redpill_emotion_shift_anger: 0.03     # baseline anger shift for redpilled agents
  redpill_glitch_foresight_radius: 0.15 # redpilled agents detect glitches within this radius
  redpill_sentinel_detect_radius: 0.2   # redpilled agents detect Sentinels within this radius
  bluepill_awareness_floor: 0.3         # blue pill resets awareness to this (not 0)
  bluepill_trust_boost: 0.3             # system_trust boost on blue pill
  bluepill_happiness_boost: 0.15        # happiness boost on blue pill
  splinter_awareness_multiplier: 1.5    # splinter-in-mind agents grow awareness 1.5x faster

  # ── Guide-type recruiters ──
  recruiter_charisma_threshold: 0.6     # min charisma to become recruiter
  recruiter_check_interval: 15          # ticks between recruiter persuasion attempts
  recruiter_search_radius: 0.12         # how far recruiters look for candidates
  recruiter_target_min_awareness: 0.3   # min awareness for target to be approachable

  # ── Anomaly quest & Core ──
  quest_oracle_contact_awareness: 0.85  # min awareness for Oracle contact stage
  quest_locksmith_radius: 0.1           # how close Anomaly must be to Locksmith
  quest_core_radius: 0.1                # how close to map center (0.5, 0.5) for Core
  core_choice_fight_threshold: 0.5      # belief/bond score above this = fight, below = reset
  core_fight_failure_chance: 0.3        # chance total system failure on fight choice
  core_fight_awareness_boost: 0.3       # global awareness boost on successful fight
  core_reset_haven_preserved: true      # Haven survives cycle reset

  # ── Gnostic Mythology Layer (Phase 5) ──
  demiurge:
    base_fear: 0.1                       # baseline fear of losing control
    base_pride: 0.5                      # baseline pride in creation
    base_confusion: 0.0                  # baseline confusion
    fear_awareness_sensitivity: 2.0      # how much total awareness ratio increases fear
    pride_control_sensitivity: 1.5       # how much control_index feeds pride
    confusion_anomaly_bonus: 0.3         # confusion spike when anomaly exists
    panic_sentinel_multiplier: 2.0       # sentinel deployment multiplier when panicked (fear > 0.6)
    proud_sentinel_reduction: 0.5        # sentinel deployment multiplier when proud (pride > 0.7, fear < 0.3)
    confused_glitch_bonus: 0.02          # extra glitch probability when confused > 0.5

  archon_systems:                        # which simulation systems have Archons
    - emotion
    - economy
    - belief
    - communication
  archon_health: 1.0                     # starting health for each Archon
  archon_combat_power: 0.9              # combat power (vs Anomaly/resistance)
  archon_chaos_multiplier: 1.5          # how much released systems become chaotic
  archon_regen_rate: 0.005              # Archon health regen per tick

  sophia_interval: 30                    # ticks between Sophia synchronicity checks
  sophia_shared_dream_chance: 0.05       # chance of shared dream synchronicity
  sophia_dead_knowledge_chance: 0.03     # chance of dead agent knowledge appearing
  sophia_pattern_chance: 0.02            # chance of terrain pattern synchronicity
  sophia_awareness_boost: 0.03           # awareness boost from synchronicities

  pleroma_min_awareness: 0.9             # minimum awareness for Pleroma glimpse
  pleroma_min_phase: "recursive"         # minimum consciousness phase
  pleroma_dream_lucid_chance: 0.2        # chance during lucid dream state
  pleroma_spike_chance: 0.05             # chance during extreme awareness spike

  # ── Consciousness Maze (Phase 5) ──
  # ── Boltzmann Brains (Phase 6) ──
  boltzmann_brain:
    base_inverse_probability: 500000     # probability = 1 / (pop * this), per tick
    time_factor: 0.001                   # probability grows by this * ticks_since_reset

  strange_loop_radius: 0.15              # max distance for strange loop formation
  strange_loop_min_awareness: 0.2        # both agents need awareness above this (lowered for earlier loops)
  strange_loop_boost: 0.015              # awareness boost per strange loop per tick (bumped)

# ── Observer Effect / Quantum Rendering (Phase 6) ──
observer_effect:
  enabled: true
  fidelity_transition_glitch_chance: 0.3   # chance aware agents detect the fidelity shift
  fidelity_awareness_boost: 0.02           # awareness boost from noticing fidelity transition

# ── Agent Archaeology (Phase 5) ──
archaeology:
  discovery_chance: 0.03                 # base chance per tick for artifact discovery (tripled)

# ── The Haven — The Real World ──
haven:
  enabled: true
  grid_size: 4                          # smaller than simulation grid
  harshness: 2.0                        # harsher than the simulation
  base_resources: 0.4                   # scarce resources
  regeneration_rate: 0.01               # slow regen
  base_carrying_capacity: 15            # lower capacity
  jackout_awareness_threshold: 0.6      # min awareness to jack out
  jackout_redpill_required: true        # must be redpilled to jack out
  jackin_mission_types:                 # available mission types
    - rescue
    - fight_sentinels
    - contact_oracle
  mission_duration_range: [5, 20]       # min/max ticks for missions
  mission_risk_base: 0.05               # base failure chance per tick
  mission_stat_boost: 0.15              # skill boost while jacked in
  mission_time_limit: 25                # max ticks before forced jack-out
  council:
    vote_interval: 30                   # ticks between council votes
    hawk_threshold: 0.5                 # aggression above this = hawk
    dove_threshold: 0.3                 # aggression below this = dove
    resource_share_rate: 0.1            # fraction of haven resources shared per vote
    mission_approval_majority: 0.5      # fraction of votes needed to approve mission

# ── System 10: Conflict & Warfare ──
conflict:
  wartime_innovation_bonus: 0.002     # tech/survival skill bonus per tick for factions at war
  aggression_combat_threshold: 0.35   # effective aggression to initiate combat (was 0.5)
  combat_radius: 0.08                 # proximity for combat (was 0.06)
  combat_damage: 0.08                 # base damage per combat tick
  war_check_interval: 25              # ticks between war condition checks (was 30)
  war_threshold: 0.4                  # combined score threshold to start war (was 0.6)
  war_ideology_weight: 0.4            # belief distance weight in war score
  war_rivalry_weight: 0.35            # mutual enemy count weight
  war_territory_weight: 0.25          # territorial overlap weight

# ── System 11: Communication & Information ──
communication:
  info_creation_interval: 10          # ticks between info creation rounds
  transmission_radius: 0.12           # max distance for info transmission
  transmission_rate: 0.3              # probability modifier for transmission
  mutation_rate: 0.15                 # chance of info degradation per hop
  knowledge_skill_boost: 0.001        # skill boost from received knowledge
  system_narrative_interval: 50       # ticks between system narrative injections
  info_lifetime: 500                  # ticks before info expires

  # ── Emergent Agent Language (Phase 5) ──
  encoding_base_complexity: 1.0        # starting encoding complexity for new info
  compression_rate: 0.05               # how much encoding compresses per repeated concept
  min_encoding_complexity: 0.2         # minimum encoding complexity (fully compressed)
  dialect_drift_rate: 0.01             # per-tick encoding divergence between factions
  dialect_check_interval: 50           # ticks between dialect divergence updates

  resistance_encryption_base: 0.5      # base encryption strength for resistance comms
  resistance_encryption_growth: 0.01   # encryption strength growth per tick
  sentinel_decryption_power: 0.3       # Sentinel base decryption capability
  sentinel_decryption_growth: 0.005    # Sentinel decryption improvement per tick

  language_artifact_chance: 0.02       # chance of leaving language artifact on faction death
  language_artifact_knowledge_boost: 0.03  # skill boost from studying language artifact
  language_artifact_awareness_boost: 0.02  # awareness boost from pre-reset language artifacts

# ── Programs — First-Class Entities ──
programs:
  enforcer:
    enabled: true
    spawn_chance: 0.01                 # per tick, when no enforcers exist (5x: was too rare)
    min_tick: 50                        # earliest tick an enforcer can spawn
    combat_power: 0.85                  # combat stat multiplier
    copy_trait_override:                # traits applied to copies (victims)
      aggression: 0.8
      resilience: 0.8
      sociability: 0.0
      curiosity: 0.0
    awareness_share_radius: 0.5        # enforcers share target locations within this radius
    max_copies: 20                      # hard cap to prevent runaway growth crashing sim
  broker:
    enabled: true
    spawn_tick: 100                     # tick when the Broker appears
    location: [0.5, 0.5]               # fixed cell ("the parlor")
    trade_radius: 0.08                  # agents must be this close to trade
    awareness_price: 3.0                # wealth cost per 0.1 awareness boost
    info_price: 1.5                     # wealth cost for secret info
    locksmith_info_price: 5.0           # wealth cost for Locksmith location
    trade_cooldown: 10                  # min ticks between trades for same agent
    # ── Black Market (Phase 6) ──
    forbidden_knowledge_price: 4.0       # wealth cost for awareness boost (stronger than regular)
    forbidden_knowledge_boost: 0.15      # awareness boost from forbidden knowledge
    memory_sacrifice_awareness_boost: 0.12  # awareness from sacrificing a memory
    bond_sacrifice_price: 0.0            # free — the cost is the bond itself
    bond_sacrifice_skill_boost: 0.08     # skill boost from sacrificing a bond
    oracle_prophecy_price: 6.0           # wealth cost for Oracle prophecy
    locksmith_rumor_radius: 0.3          # how accurately Broker knows Locksmith location
  guardian:
    enabled: true
    spawn_chance: 0.006                 # per tick, when no guardians exist (6x: was too rare)
    min_tick: 30                        # earliest tick a guardian can spawn
    combat_power: 0.95                  # very high combat stats
    patrol_radius: 0.15                 # patrols near Oracle-guided agents
    interception_radius: 0.08           # range to intercept Sentinel attacks
    enforcer_immune: true               # cannot be copied by Enforcer
  locksmith:
    enabled: true
    spawn_chance: 0.004                 # was 0.0005 — too rare, never appeared in 500 ticks
    min_tick: 60                        # earliest tick (was 80)
    key_creation_interval: 20           # ticks between key creation
    max_keys_per_agent: 3               # max teleport keys an agent can hold
    key_range: 0.4                      # max teleport distance for generated keys

# ── Simulation Dreams ──
dreams:
  cycle_interval: 50              # every N ticks, dream state activates
  duration: 5                     # dream state lasts K ticks
  movement_range_multiplier: 2.0  # movement speed multiplier during dreams
  terrain_effect_reduction: 0.5   # terrain harshness reduced by this factor during dreams
  ghost_max_age: 20               # only agents dead within this many ticks can manifest as ghosts
  ghost_manifest_chance: 0.3      # per-dead-agent chance of manifesting as ghost each dream tick
  max_ghosts: 10                  # cap on simultaneous ghost manifestations
  lucid_awareness_threshold: 0.4  # min awareness to attempt lucid dreaming (lowered from 0.5)
  lucid_base_chance: 0.3          # base probability of becoming lucid (scaled by awareness*curiosity*reality_testing)
  lucid_awareness_boost: 0.02     # permanent awareness boost from lucid dreaming per dream cycle
  lucid_communication_range: 1.0  # lucid agents can communicate across entire map (1.0 = full)
  lucid_memory_unlock_count: 3    # number of hidden/old memories unlocked during lucid dream
  collective_unconscious_events: 5  # number of recent events sampled for dream content

# ── Procedural Mythology ──
mythology:
  era_summary_interval: 100            # ticks between era summary generation
  myth_check_interval: 50              # ticks between myth trigger checks
  legend_check_interval: 100           # ticks between legendary figure checks
  legend_discovery_chance: 0.005       # per-agent per-tick chance of discovering a legend
  max_myths_per_trigger: 5             # cap on myths generated per trigger event
  max_legends: 20                      # cap on total legendary figures

# ── Nested Simulations (Phase 5) ──
nested_simulation:
  enabled: true
  sub_grid_size: 4                     # sub-sim grid size (4x4)
  sub_max_agents: 20                   # max agents in a sub-sim
  sub_initial_agents: 8                # starting population per sub-sim
  sub_ticks_per_parent_tick: 3         # N sub-ticks per parent tick
  sub_awareness_growth_rate: 0.012     # faster awareness growth in sub-sims
  sub_health_decay: 0.003              # base health decay in sub-sims
  max_world_engines: 3                 # max active World Engines
  recursive_awareness_threshold: 0.7   # sub-sim agent awareness to trigger recursive paradox
  recursive_awareness_boost: 0.05      # awareness boost to parent observer when sub-agent becomes recursive
  observer_radius: 0.15                # max distance from World Engine cell center to observe